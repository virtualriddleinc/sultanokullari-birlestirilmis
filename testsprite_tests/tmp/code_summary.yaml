version: "2"
type: frontend
tech_stack:
  - TypeScript
  - Next.js App Router
  - Payload CMS 3
  - React
  - SCSS
  - PostgreSQL
routes:
  - path: /admin/login
    file: src/components/payload/admin/AdminLoginBackdrop.tsx
    auth_required: false
    description: Branded admin login
  - path: /admin
    file: src/components/payload/admin/DashboardWelcome.tsx
    auth_required: true
    description: Custom admin dashboard
  - path: /admin/logout
    file: src/components/payload/admin/AdminLogoutButton.tsx
    auth_required: true
    description: Logout
  - path: /admin/account
    file: src/app/(payload)/admin/[[...segments]]/page.tsx
    auth_required: true
    description: Account settings
  - path: /admin/collections/hero-slides
    file: src/collections/HeroSlides.ts
    auth_required: true
    description: Hero slides list orderable
  - path: /admin/collections/hero-slides/create
    file: src/collections/HeroSlides.ts
    auth_required: true
    description: Create hero with LimitedText HexFocal MediaAltSync
  - path: /admin/collections/journey-chapters
    file: src/collections/JourneyChapters.ts
    auth_required: true
    description: Journey chapters orderable
  - path: /admin/collections/neden-sultan-items
    file: src/collections/NedenSultanItems.ts
    auth_required: true
    description: Neden Sultan items orderable
  - path: /admin/collections/instagram-posts
    file: src/collections/InstagramPosts.ts
    auth_required: true
    description: Instagram posts orderable
  - path: /admin/globals/ana-sayfa
    file: src/globals/AnaSayfa.ts
    auth_required: true
    description: Homepage layout global with tabs and SectionPreviewLink
  - path: /admin/collections/branches
    file: src/collections/Branches.ts
    auth_required: true
    description: School branches
  - path: /admin/collections/staff
    file: src/collections/Staff.ts
    auth_required: true
    description: Administrative staff orderable
  - path: /admin/collections/news
    file: src/collections/News.ts
    auth_required: true
    description: News with drafts
  - path: /admin/collections/news/create
    file: src/collections/News.ts
    auth_required: true
    description: Create news draft
  - path: /admin/collections/events
    file: src/collections/Events.ts
    auth_required: true
    description: Events with drafts
  - path: /admin/collections/pages
    file: src/collections/Pages.ts
    auth_required: true
    description: CMS pages templates and blocks
  - path: /admin/collections/media
    file: src/collections/Media.ts
    auth_required: true
    description: Media library upload alt required
  - path: /admin/collections/media-items
    file: src/collections/MediaItems.ts
    auth_required: true
    description: Media archive draft publish
  - path: /admin/collections/contact-messages
    file: src/collections/ContactMessages.ts
    auth_required: true
    description: Contact inbox auto-read bulk quick actions
  - path: /admin/collections/ik-applications
    file: src/collections/IkApplications.ts
    auth_required: true
    description: HR inbox examined archive
  - path: /admin/collections/application-files
    file: src/collections/ApplicationFiles.ts
    auth_required: true
    description: Application files read-only
  - path: /admin/collections/users
    file: src/collections/Users.ts
    auth_required: true
    description: Users roles admin only
  - path: /admin/collections/audit-logs
    file: src/collections/AuditLogs.ts
    auth_required: true
    description: Audit logs admin read-only
  - path: /admin/globals/site-ayarlari
    file: src/globals/SiteAyarlari.ts
    auth_required: true
    description: Site settings admin only
  - path: /admin/globals/navigation
    file: src/globals/Navigation.ts
    auth_required: true
    description: Navigation CMS menu admin only
features:
  - name: Admin Login Logout Auth
    description: Email password login branded panel logout and auth gating
    files:
      - src/components/payload/admin/AdminLoginBackdrop.tsx
      - src/components/payload/admin/AdminLogoutButton.tsx
      - src/collections/Users.ts
    entry_route: /admin/login
    user_interactions:
      - Open /admin/login and see brand panel
      - Login with admin@admin.com
      - Reject invalid credentials
      - Click Çıkış Yap logout
      - After logout protected routes redirect to login
    api_calls:
      - method: POST
        endpoint: /api/users/login
      - method: POST
        endpoint: /api/users/logout
    auth_required: false
  - name: Admin Dashboard And Nav
    description: DashboardWelcome stats quick links AdminHomeNavLink InboxNavLinks badges
    files:
      - src/components/payload/admin/DashboardWelcome.tsx
      - src/components/payload/admin/AdminHomeNavLink.tsx
      - src/components/payload/admin/InboxNavLinks.tsx
    entry_route: /admin
    user_interactions:
      - View stats Taslak haber Okunmamış mesaj
      - Click unread message stat to filtered list
      - Click Ana Sayfa nav to return dashboard
      - See Mesajlar İK badges when new inbox items exist
      - Use quick links Hero Slaytları Haber Gelen Kutusu Kullanıcılar
    api_calls:
      - method: GET
        endpoint: /api/news
      - method: GET
        endpoint: /api/contact-messages
    auth_required: true
  - name: Hero Slides Deep
    description: Hero CRUD LimitedTextField HexFocalPointPicker MediaAltSync orderable live preview
    files:
      - src/collections/HeroSlides.ts
      - src/components/payload/admin/LimitedTextField.tsx
      - src/components/payload/admin/HexFocalPointPicker.tsx
      - src/components/payload/admin/MediaAltSync.tsx
    entry_route: /admin/collections/hero-slides
    user_interactions:
      - Open list from sidebar Ana Sayfa group
      - Create slide fill limited fields observe counters
      - Paste over-limit text and verify hard truncate
      - Select media and verify alt sync
      - Adjust hex focal and scale then save reload persist
      - Drag reorder two slides
      - Open live preview mobile desktop breakpoints
    api_calls:
      - method: GET
        endpoint: /api/hero-slides
      - method: POST
        endpoint: /api/hero-slides
      - method: PATCH
        endpoint: /api/hero-slides/{id}
    auth_required: true
  - name: Journey Neden Instagram
    description: Orderable homepage supporting collections CRUD
    files:
      - src/collections/JourneyChapters.ts
      - src/collections/NedenSultanItems.ts
      - src/collections/InstagramPosts.ts
    entry_route: /admin/collections/journey-chapters
    user_interactions:
      - Open Yolculuk Bölümleri create edit save
      - Open Neden Sultan Maddeleri create edit
      - Open Instagram Gönderileri create edit
      - Verify orderable lists load
    api_calls:
      - method: GET
        endpoint: /api/journey-chapters
      - method: GET
        endpoint: /api/neden-sultan-items
      - method: GET
        endpoint: /api/instagram-posts
    auth_required: true
  - name: Ana Sayfa Global Tabs
    description: Homepage global all tabs SectionPreviewLink
    files:
      - src/globals/AnaSayfa.ts
      - src/components/payload/admin/SectionPreviewLink.tsx
    entry_route: /admin/globals/ana-sayfa
    user_interactions:
      - Open Ana Sayfa Düzeni from sidebar
      - Visit tabs Gayemiz Yolculuk Neden Video Okullar Guncel Instagram Kisa Yollar Yemekhane Modal
      - Click section preview links with hash anchors
      - Save a small change
    api_calls:
      - method: GET
        endpoint: /api/globals/ana-sayfa
      - method: POST
        endpoint: /api/globals/ana-sayfa
    auth_required: true
  - name: Branches And Staff
    description: Schools group branches tabs and staff orderable
    files:
      - src/collections/Branches.ts
      - src/collections/Staff.ts
    entry_route: /admin/collections/branches
    user_interactions:
      - Open Subeler list search
      - Open branch edit tabs Genel Iletisim Medya SEO URL
      - Open Idari Kadro list create staff
      - Verify published staff visible in list
    api_calls:
      - method: GET
        endpoint: /api/branches
      - method: GET
        endpoint: /api/staff
    auth_required: true
  - name: News Events Pages Drafts
    description: Content drafts publish lexical templates blocks
    files:
      - src/collections/News.ts
      - src/collections/Events.ts
      - src/collections/Pages.ts
    entry_route: /admin/collections/news
    user_interactions:
      - Create news Save Draft and see Draft in list
      - Admin publish news
      - Open events list create draft
      - Open pages list open page form templates and blocks
    api_calls:
      - method: GET
        endpoint: /api/news
      - method: POST
        endpoint: /api/news
      - method: GET
        endpoint: /api/events
      - method: GET
        endpoint: /api/pages
    auth_required: true
  - name: Media Library And Archive
    description: Media upload alt required and media-items drafts
    files:
      - src/collections/Media.ts
      - src/collections/MediaItems.ts
    entry_route: /admin/collections/media
    user_interactions:
      - Create media via Paste URL with required alt
      - Search media by alt
      - Open Medya Arsivi create draft item
    api_calls:
      - method: GET
        endpoint: /api/media
      - method: POST
        endpoint: /api/media
      - method: GET
        endpoint: /api/media-items
    auth_required: true
  - name: Contact Inbox Deep
    description: Contact messages status auto-read quick bulk no create
    files:
      - src/collections/ContactMessages.ts
      - src/components/payload/admin/InboxAutoRead.tsx
      - src/components/payload/admin/InboxQuickActions.tsx
      - src/components/payload/admin/InboxBulkActions.tsx
      - src/components/payload/admin/InboxStatusCell.tsx
    entry_route: /admin/collections/contact-messages
    user_interactions:
      - Open list see Yeni Okundu Arsiv badges
      - Confirm no Create button
      - Open NEW message observe auto-read to Okundu
      - Use Arsivle quick action
      - Select two rows use bulk archive
      - Filter status new
    api_calls:
      - method: GET
        endpoint: /api/contact-messages
      - method: PATCH
        endpoint: /api/contact-messages/{id}
    auth_required: true
  - name: IK Inbox And Application Files
    description: IK applications Incelendi archive and read-only files
    files:
      - src/collections/IkApplications.ts
      - src/collections/ApplicationFiles.ts
    entry_route: /admin/collections/ik-applications
    user_interactions:
      - Open IK list open new application
      - See Incelendi quick action
      - Open Basvuru Dosyalari list read-only no create
    api_calls:
      - method: GET
        endpoint: /api/ik-applications
      - method: GET
        endpoint: /api/application-files
    auth_required: true
  - name: Settings Globals Users Audit
    description: Users audit site settings navigation admin only
    files:
      - src/collections/Users.ts
      - src/collections/AuditLogs.ts
      - src/globals/SiteAyarlari.ts
      - src/globals/Navigation.ts
    entry_route: /admin/collections/users
    user_interactions:
      - Open Kullanicilar list as admin
      - Open Denetim Kayitlari read-only list
      - Open Site Ayarlari save footer fields
      - Open Navigasyon toggle useCmsMenu
    api_calls:
      - method: GET
        endpoint: /api/users
      - method: GET
        endpoint: /api/audit-logs
      - method: GET
        endpoint: /api/globals/site-ayarlari
      - method: GET
        endpoint: /api/globals/navigation
    auth_required: true
  - name: Role Matrix Editor Inbox
    description: Editor and inbox role access restrictions
    files:
      - src/payload/access/index.ts
      - src/collections/Users.ts
    entry_route: /admin/login
    user_interactions:
      - Login as editor@test.local password admin123
      - Confirm content access and no Users Site Ayarlari Navigasyon Audit
      - Login as inbox@test.local password admin123
      - Confirm only inbox collections accessible
    api_calls:
      - method: POST
        endpoint: /api/users/login
    auth_required: false
known_limitations:
  - issue: Contact and IK records cannot be created from admin UI
    location: src/collections/ContactMessages.ts
    impact: Tests must use seeded records
  - issue: TestSprite cloud may not access local disk file uploads
    location: media create
    impact: Prefer Paste URL for media tests
  - issue: Roles editor@test.local and inbox@test.local password admin123
    location: users
    impact: Use for role matrix tests
